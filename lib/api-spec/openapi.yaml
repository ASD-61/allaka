    StoreReviewInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject, suspend, reactivate]
        subscriptionMonths:
          type: integer
          minimum: 1
          maximum: 24
          description: Subscription length in months on approval (default 3).
        subscriptionMode:
          type: string
          enum: [extend, set]
          description: >-
            How to apply subscriptionMonths on approval. "extend" (default) adds
            the months onto the later of now or the current expiry (renewals
            stack). "set" replaces the expiry with exactly that many months from
            today — used to correct or reduce a subscription after a misclick.
