          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Product:
      type: object
      required:
        - id
        - name
        - category
        - price
        - unit
        - imageUrl
        - rating
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
          description: Vegetable name in Arabic
        category:
          type: string
          description: Category name in Arabic
        price:
          type: integer
          description: Price in Iraqi Dinar (IQD)
        originalPrice:
          type: ["integer", "null"]
          description: Original price before discount, in IQD
        unit:
          type: string
          description: Unit of sale, e.g. "1 كغم"
        imageUrl:
          type: string
          description: Public URL or storage object path for the product image
        description:
          type: ["string", "null"]
          description: Extra details about the vegetable
        rating:
          type: number
        isVip:
          type: boolean
        discountPercent:
          type: ["integer", "null"]
        discountExpiresAt:
          type: ["string", "null"]
          format: date-time
          description: When the current offer price expires; the server reverts the price automatically after this time.
        inStock:
          type: boolean
          description: Whether the product is currently available to order
        isLocal:
          type: boolean
          description: Locally-grown produce badge ("منتج محلي").
        isClearance:
          type: boolean
          description: Part of the end-of-day clearance section ("تصفية العلوة").
        isWholesale:
          type: boolean
          description: Sold by the sack/box in the wholesale section ("قسم الجملة").
        wholesalePrice:
          type: ["integer", "null"]
          description: Wholesale price for the "قسم الجملة" listing (distinct from retail price).
        priceNote:
          type: ["string", "null"]
          description: Free-text custom pricing note, e.g. "٣ كيلو بـ٢٠٠٠".
        storeId:
          type: ["integer", "null"]
          description: Owning store id in the marketplace.
        createdAt:
          type: string
          format: date-time
    ProductSearchResult:
      type: object
      required: [product, store]
      properties:
        product:
          $ref: "#/components/schemas/Product"
        store:
          $ref: "#/components/schemas/Store"
    ProductInput:
      type: object
