          type: integer
          description: Running sum of all customer star ratings (1–5) for this store.
        ratingCount:
          type: integer
          description: How many ratings were given — average = ratingSum / ratingCount.
        distanceKm:
          type: ["number", "null"]
          description: Distance from the customer's location, in km — only present when the request included lat/lng.
        createdAt:
          type: string
          format: date-time
    StoreInput:
