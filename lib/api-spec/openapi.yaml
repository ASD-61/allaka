openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Products
    description: Vegetable product catalog operations.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Categories
    description: Product category management (admin).
  - name: Admin
    description: Admin authentication.
  - name: Orders
    description: Customer order placement and admin order management.
  - name: Customers
    description: Customer loyalty points lookup.
  - name: Auth
    description: Customer WhatsApp OTP authentication and profile.
  - name: Addresses
    description: Customer delivery address management.
  - name: Notifications
    description: Customer order-derived notifications.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: listProducts
      tags: [Products]
      summary: List vegetable products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category name. Omit or pass "الكل" for all.
        - name: storeId
          in: query
          required: false
          schema:
            type: integer
          description: Filter to products of a single store.
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [Products]
      summary: Add a new vegetable product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /products/search:
    get:
      operationId: searchProducts
      tags: [Products]
      summary: Find in-stock products by name across active stores, nearest-first
      description: |
        Searches product names (e.g. "رمان") across every active store's
        catalog. Only in-stock items are returned. When lat/lng are given,
        results are sorted by the store's distance from that point (stores
        without a saved map pin are listed last); otherwise newest first.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: lat
          in: query
          required: false
          schema:
            type: number
        - name: lng
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Matching in-stock products with their store
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSearchResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /products/{id}:
    get:
      operationId: getProduct
      tags: [Products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateProduct
      tags: [Products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteProduct
      tags: [Products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: List product categories for a store
      parameters:
        - name: storeId
          in: query
          required: false
          schema:
            type: integer
          description: The store whose categories to list. Admin callers may omit this to get their own store's categories; other callers must pass it.
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [Categories]
      summary: Create a category for a store (the store's owner or an admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [Categories]
      summary: Rename a category (the store's owner or an admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteCategory
      tags: [Categories]
      summary: Delete a category (the store's owner or an admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores:
    get:
      operationId: listStores
      tags: [Stores]
      summary: List active (approved) stores, nearest-first when a location is given
      parameters:
        - name: lat
          in: query
          required: false
          schema:
            type: number
          description: Customer's latitude — when given (with lng), stores are sorted nearest-first and each gets a distanceKm.
        - name: lng
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Active stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [Stores]
      summary: Register a store (merchant) — created pending admin review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created store (pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/mine:
    get:
      operationId: listMyStores
      tags: [Stores]
      summary: List stores owned by the authenticated merchant
      responses:
        "200":
          description: The caller's stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/admin:
    get:
      operationId: listAllStores
      tags: [Stores]
      summary: List all stores in any status (admin only)
      responses:
        "200":
          description: All stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}:
    get:
      operationId: getStore
      tags: [Stores]
      summary: Get a single store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateStore
      tags: [Stores]
      summary: Update a store (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteStore
      tags: [Stores]
      summary: Permanently delete a store and its products (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/review:
    patch:
      operationId: reviewStore
      tags: [Stores]
      summary: Approve, reject, suspend or reactivate a store (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreReviewInput"
      responses:
        "200":
          description: Reviewed store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/orders:
    get:
      operationId: listStoreOrders
      tags: [Stores]
      summary: List a store's orders (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The store's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/customers:
    get:
      operationId: listStoreCustomers
      tags: [Stores]
      summary: List customers who ordered from a store (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated customers for the store
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreCustomer"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/refunds:
    get:
      operationId: listStoreRefunds
      tags: [Stores]
      summary: List compensation requests for a store's orders (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The store's compensation requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreRefund"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/refunds/{refundId}:
    patch:
      operationId: decideStoreRefund
      tags: [Stores]
      summary: Approve (with amount) or reject a compensation for the store's own order (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: refundId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundDecisionInput"
      responses:
        "200":
          description: Updated refund
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Refund"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /stores/{id}/drivers:
    get:
      operationId: listStoreDrivers
      tags: [DeliveryDrivers]
      summary: List a store's delivery drivers, any status (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The store's delivery drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryDriver"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createStoreDriver
      tags: [DeliveryDrivers]
      summary: Add a new delivery driver for a store — usable immediately (owner or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryDriverInput"
      responses:
        "201":
          description: Created driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryDriver"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /drivers:
    get:
      operationId: listAllDrivers
      tags: [DeliveryDrivers]
      summary: List every delivery driver across every store, with store name (admin only)
      responses:
        "200":
          description: All delivery drivers with their store name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryDriver"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /drivers/{driverId}/status:
    patch:
      operationId: setDriverStatus
      tags: [DeliveryDrivers]
      summary: Suspend or reactivate a delivery driver (admin only)
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryDriverStatusInput"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryDriver"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /drivers/{driverId}:
    patch:
      operationId: updateDriver
      tags: [DeliveryDrivers]
      summary: Edit a delivery driver's name / phone / vehicle type (owner or admin)
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryDriverUpdate"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryDriver"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteDriver
      tags: [DeliveryDrivers]
      summary: Remove a delivery driver (owner or admin)
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /store-types:
    get:
      operationId: listStoreTypes
      tags: [StoreTypes]
      summary: List curated store types (public)
      responses:
        "200":
          description: Store types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreType"
    post:
      operationId: createStoreType
      tags: [StoreTypes]
      summary: Add a store type (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTypeInput"
      responses:
        "201":
          description: Created store type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreType"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Duplicate type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /store-types/{id}:
    patch:
      operationId: updateStoreType
      tags: [StoreTypes]
      summary: Update a store type (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTypeUpdate"
      responses:
        "200":
          description: Updated store type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreType"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteStoreType
      tags: [StoreTypes]
      summary: Delete a store type (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /recipes:
    get:
      operationId: listRecipes
      tags: [Recipes]
      summary: List recipes for the "what to cook" helper (public)
      responses:
        "200":
          description: Recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [Recipes]
      summary: Add a recipe (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /recipes/{id}:
    patch:
      operationId: updateRecipe
      tags: [Recipes]
      summary: Update a recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdate"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteRecipe
      tags: [Recipes]
      summary: Delete a recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/login:
    post:
      operationId: adminLogin
      tags: [Admin]
      summary: Log in as admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [Admin]
      summary: Log out of admin session
      responses:
        "204":
          description: Logged out
  /admin/session:
    get:
      operationId: getAdminSession
      tags: [Admin]
      summary: Get current admin session state
