# Render Blueprint for the علاّكة API server (Node/Express).
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, pick the
# repo. Render reads this file and creates the service. Fill the secret env vars
# (marked sync:false) in the Render dashboard. Images are NOT stored on Render —
# they upload directly to your S3-compatible bucket (see S3_* vars).
services:
  - type: web
    name: alaka-api
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: corepack enable && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; the server reads it.
      - key: DATABASE_URL
        sync: false # Neon connection string
      - key: SESSION_SECRET
        generateValue: true # strong random secret, required in production
      - key: ADMIN_PASSWORD
        sync: false
      - key: WASENDER_API_TOKEN
        sync: false
      # Comma-separated browser origins allowed for CORS (optional for the
      # mobile app, needed if you use the web build). e.g. https://app.alaka.iq
      - key: ALLOWED_ORIGINS
        sync: false
      # ---- Image storage (S3-compatible: Cloudflare R2 / Supabase / B2 / S3) ----
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false # public read base URL of the bucket / CDN
      - key: S3_ENDPOINT
        sync: false # required for R2/Supabase/B2; leave empty for AWS S3
      - key: S3_REGION
        value: auto
